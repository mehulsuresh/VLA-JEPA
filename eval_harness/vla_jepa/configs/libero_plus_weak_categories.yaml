# Targeted LIBERO-Plus eval for categories where YAK-1 underperformed PI0.5.
#
# This runs the three weak perturbation categories across all four base suites:
# - Language Instructions
# - Objects Layout
# - Robot Initial States
#
# Total episodes: 4,612.
server:
  url: "ws://127.0.0.1:8000"
  timeout: 120

output_dir: "${oc.env:VLA_JEPA_EVAL_OUTPUT,/home/mehul/work/vjepa/eval_videos/harness_libero_plus_weak_categories}"

defaults:
  benchmark: &benchmark "eval_harness.vla_jepa.libero_plus_benchmark:VLAJEPALIBEROPlusBenchmark"
  episodes_per_task: &episodes_per_task 1
  paced: &paced false
  common_params: &common_params
    seed: 7
    num_steps_wait: 10
    send_wrist_image: true
    send_state: true
    quat_no_antipodal: true
  recording: &recording
    record_video: false
    record_step: false
    video_fps: 10
    filename_stem: "{suite}_task{task_id:04d}_ep{episode_idx:04d}_{status}"

benchmarks:
  - benchmark: *benchmark
    subname: libero_plus_spatial_language_instructions
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_spatial, category: "Language Instructions"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_object_language_instructions
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_object, category: "Language Instructions"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_goal_language_instructions
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_goal, category: "Language Instructions"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_10_language_instructions
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_10, category: "Language Instructions"}
    recording: *recording

  - benchmark: *benchmark
    subname: libero_plus_spatial_objects_layout
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_spatial, category: "Objects Layout"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_object_objects_layout
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_object, category: "Objects Layout"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_goal_objects_layout
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_goal, category: "Objects Layout"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_10_objects_layout
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_10, category: "Objects Layout"}
    recording: *recording

  - benchmark: *benchmark
    subname: libero_plus_spatial_robot_initial_states
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_spatial, category: "Robot Initial States"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_object_robot_initial_states
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_object, category: "Robot Initial States"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_goal_robot_initial_states
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_goal, category: "Robot Initial States"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_10_robot_initial_states
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_10, category: "Robot Initial States"}
    recording: *recording
