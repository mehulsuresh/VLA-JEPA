# Full LIBERO-Plus eval through allenai/vla-evaluation-harness.
#
# This uses the official harness structure: four LIBERO suites containing all
# 10,030 perturbed variants, one rollout per variant.
server:
  url: "ws://127.0.0.1:8000"
  timeout: 120

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero-plus:latest

output_dir: "${oc.env:VLA_JEPA_EVAL_OUTPUT,/home/mehul/work/vjepa/eval_videos/harness_libero_plus}"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero_plus.benchmark:LIBEROPlusBenchmark"
    subname: libero_plus_spatial
    episodes_per_task: 1
    paced: false
    params:
      suite: libero_spatial
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: true
      quat_no_antipodal: true
    recording:
      record_video: false
      record_step: false
      video_fps: 10
      filename_stem: "{suite}_task{task_id:04d}_ep{episode_idx:04d}_{status}"

  - benchmark: "vla_eval.benchmarks.libero_plus.benchmark:LIBEROPlusBenchmark"
    subname: libero_plus_object
    episodes_per_task: 1
    paced: false
    params:
      suite: libero_object
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: true
      quat_no_antipodal: true
    recording:
      record_video: false
      record_step: false
      video_fps: 10
      filename_stem: "{suite}_task{task_id:04d}_ep{episode_idx:04d}_{status}"

  - benchmark: "vla_eval.benchmarks.libero_plus.benchmark:LIBEROPlusBenchmark"
    subname: libero_plus_goal
    episodes_per_task: 1
    paced: false
    params:
      suite: libero_goal
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: true
      quat_no_antipodal: true
    recording:
      record_video: false
      record_step: false
      video_fps: 10
      filename_stem: "{suite}_task{task_id:04d}_ep{episode_idx:04d}_{status}"

  - benchmark: "vla_eval.benchmarks.libero_plus.benchmark:LIBEROPlusBenchmark"
    subname: libero_plus_10
    episodes_per_task: 1
    paced: false
    params:
      suite: libero_10
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: true
      quat_no_antipodal: true
    recording:
      record_video: false
      record_step: false
      video_fps: 10
      filename_stem: "{suite}_task{task_id:04d}_ep{episode_idx:04d}_{status}"
