# LIBERO-Plus robot initial state perturbation eval.
#
# This filters the official LIBERO-Plus task_classification.json category:
# "Robot Initial States". Across all four suites this is 1,550 rollout tasks.
server:
  url: "ws://127.0.0.1:8000"
  timeout: 120

output_dir: "${oc.env:VLA_JEPA_EVAL_OUTPUT,/home/mehul/work/vjepa/eval_videos/harness_libero_plus_robot_initial_states}"

benchmarks:
  - benchmark: "eval_harness.vla_jepa.libero_plus_benchmark:VLAJEPALIBEROPlusBenchmark"
    subname: libero_plus_spatial_robot_initial_states
    episodes_per_task: 1
    paced: false
    params:
      suite: libero_spatial
      category: "Robot Initial States"
      seed: 7
      num_steps_wait: 10
      send_wrist_image: true
      send_state: true
      quat_no_antipodal: true
    recording:
      record_video: false
      record_step: false
      video_fps: 10
      filename_stem: "{suite}_task{task_id:04d}_ep{episode_idx:04d}_{status}"

  - benchmark: "eval_harness.vla_jepa.libero_plus_benchmark:VLAJEPALIBEROPlusBenchmark"
    subname: libero_plus_object_robot_initial_states
    episodes_per_task: 1
