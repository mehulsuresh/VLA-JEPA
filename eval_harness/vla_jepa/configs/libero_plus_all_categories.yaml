# Full LIBERO-Plus eval grouped by perturbation category.
#
# This runs all 10,030 LIBERO-Plus variants across the four base suites and the
# seven official perturbation categories. The local wrapper passes the category
# into the LIBERO suite constructor so the source suite does not silently default
# to Camera Viewpoints.
server:
  url: "ws://127.0.0.1:8000"
  timeout: 120

output_dir: "${oc.env:VLA_JEPA_EVAL_OUTPUT,/home/mehul/work/vjepa/eval_videos/harness_libero_plus_all_categories}"

defaults:
  benchmark: &benchmark "eval_harness.vla_jepa.libero_plus_benchmark:VLAJEPALIBEROPlusBenchmark"
  episodes_per_task: &episodes_per_task 1
  paced: &paced false
  common_params: &common_params
    seed: 7
    num_steps_wait: 10
    send_wrist_image: true
    send_state: true
    quat_no_antipodal: true
  recording: &recording
    record_video: false
    record_step: false
    video_fps: 10
    filename_stem: "{suite}_task{task_id:04d}_ep{episode_idx:04d}_{status}"

benchmarks:
  - benchmark: *benchmark
    subname: libero_plus_spatial_background_textures
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_spatial, category: "Background Textures"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_object_background_textures
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_object, category: "Background Textures"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_goal_background_textures
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_goal, category: "Background Textures"}
    recording: *recording
  - benchmark: *benchmark
    subname: libero_plus_10_background_textures
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_10, category: "Background Textures"}
    recording: *recording

  - benchmark: *benchmark
    subname: libero_plus_spatial_camera_viewpoints
    episodes_per_task: *episodes_per_task
    paced: *paced
    params: {<<: *common_params, suite: libero_spatial, category: "Camera Viewpoints"}
