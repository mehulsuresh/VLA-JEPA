<svg width="1820" height="1140" viewBox="0 0 1820 1140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 36px 'Helvetica Neue', Arial, sans-serif; fill: #182B44; }
      .subtitle { font: 500 17px 'Helvetica Neue', Arial, sans-serif; fill: #586B7D; }
      .laneTitle { font: 700 18px 'Helvetica Neue', Arial, sans-serif; fill: #2A4868; letter-spacing: 0.2em; }
      .label { font: 700 18px 'Helvetica Neue', Arial, sans-serif; fill: #1F3147; }
      .labelSm { font: 700 16px 'Helvetica Neue', Arial, sans-serif; fill: #1F3147; }
      .body { font: 500 14px 'Helvetica Neue', Arial, sans-serif; fill: #4A6075; }
      .small { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #6A7C8E; }
      .micro { font: 500 12px 'Helvetica Neue', Arial, sans-serif; fill: #6A7C8E; }
      .edge { font: 700 12px 'Helvetica Neue', Arial, sans-serif; fill: #4A6075; }
      .chip { font: 700 11px 'Helvetica Neue', Arial, sans-serif; letter-spacing: 0.10em; }
      .chipBig { font: 700 12px 'Helvetica Neue', Arial, sans-serif; letter-spacing: 0.10em; }
      .formula { font: 700 22px 'Helvetica Neue', Arial, sans-serif; fill: #6A2323; }
      .formulaBig { font: 700 26px 'Helvetica Neue', Arial, sans-serif; fill: #6A2323; }
      .footer { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #67768A; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#AAB6C3" flood-opacity="0.16"/>
    </filter>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A6075"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355C85"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6D5D96"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3D7B53"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C28556"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B23B3B"/>
    </marker>
  </defs>

  <rect width="1820" height="1140" fill="#F5F7FA"/>
  <rect x="28" y="24" width="1764" height="1092" rx="28" fill="#FBFCFE" stroke="#D8E1EA" stroke-width="2"/>

  <text x="64" y="78" class="title">VLA-JEPA: Joint Policy + Latent World Model + Geometry Distillation</text>
  <text x="64" y="106" class="subtitle">Three streams · three losses · one combined objective. Frozen perception in blue/orange, trainable heads in green.</text>

  <!-- Lane backgrounds (subtle stripes) -->
  <rect x="50" y="148" width="560" height="730" rx="22" fill="#F8FAFD" stroke="#E2E9F1" stroke-width="1.5"/>
  <rect x="630" y="148" width="560" height="730" rx="22" fill="#F8FBF9" stroke="#E0EAE2" stroke-width="1.5"/>
  <rect x="1210" y="148" width="560" height="730" rx="22" fill="#FBF7F4" stroke="#EFE3D8" stroke-width="1.5"/>

  <!-- Lane titles -->
  <text x="330" y="178" class="laneTitle" text-anchor="middle">POLICY</text>
  <text x="910" y="178" class="laneTitle" text-anchor="middle">WORLD MODEL</text>
  <text x="1490" y="178" class="laneTitle" text-anchor="middle">GEOMETRY DISTILLATION</text>

  <!-- =================== LANE 1 :: POLICY =================== -->

  <!-- Inputs (4 sub-boxes) -->
  <rect x="74" y="200" width="512" height="100" rx="14" fill="#FFF9EA" stroke="#E0AF45" stroke-width="1.6"/>
  <text x="92" y="222" class="labelSm">Inputs</text>
  <rect x="92" y="232" width="116" height="56" rx="10" fill="#FFFDF5" stroke="#E0AF45" stroke-width="1.2"/>
  <text x="150" y="256" class="micro" text-anchor="middle">Lang + Imgs</text>
  <text x="150" y="274" class="micro" text-anchor="middle">last frame · CoT</text>
  <rect x="216" y="232" width="116" height="56" rx="10" fill="#FFFDF5" stroke="#E0AF45" stroke-width="1.2"/>
  <text x="274" y="256" class="micro" text-anchor="middle">Robot State</text>
  <text x="274" y="274" class="micro" text-anchor="middle">float32</text>
  <rect x="340" y="232" width="116" height="56" rx="10" fill="#FFFDF5" stroke="#E0AF45" stroke-width="1.2"/>
  <text x="398" y="256" class="micro" text-anchor="middle">Future Actions</text>
  <text x="398" y="274" class="micro" text-anchor="middle">horizon = 50</text>
  <rect x="464" y="232" width="116" height="56" rx="10" fill="#FFFDF5" stroke="#E0AF45" stroke-width="1.2"/>
  <text x="522" y="256" class="micro" text-anchor="middle">RA-BC</text>
  <text x="522" y="274" class="micro" text-anchor="middle">progress · mistake</text>

  <!-- Frozen encoder: Qwen 3.5 VL -->
  <rect x="74" y="328" width="512" height="118" rx="18" fill="#EAF0FF" stroke="#6C92D0" stroke-width="2" filter="url(#shadow)"/>
  <text x="92" y="356" class="label">Qwen 3.5 VL · forward_features</text>
  <text x="92" y="380" class="body">Multimodal feature extractor (Qwen3.5-0.8B)</text>
  <text x="92" y="402" class="small">flash_attention_2 · LoRA optional · channels-last optional</text>
  <text x="92" y="422" class="small">Outputs: action / embodied-action / image-token hiddens</text>
  <rect x="430" y="338" width="146" height="24" rx="12" fill="#D8E4FF"/>
  <text x="503" y="354" class="chip" text-anchor="middle" fill="#284D79">FROZEN · LoRA · FULL FT</text>

  <!-- Trainable head: DiT Action Head -->
  <rect x="74" y="478" width="512" height="226" rx="18" fill="#EDF8EF" stroke="#69A875" stroke-width="2" filter="url(#shadow)"/>
  <text x="92" y="506" class="label">DiT-B Flow-Matching Action Head</text>
  <text x="92" y="530" class="body">State + action encoder + 16-layer cross-attention DiT</text>
  <text x="92" y="556" class="small">• Per-sample flow-matching loss (reduction='none')</text>
  <text x="92" y="578" class="small">• RTC prefix conditioning · warmup_steps + ramp_steps</text>
  <text x="92" y="600" class="small">• repeated_diffusion_steps cheap step augmentation</text>
  <text x="92" y="622" class="small">• RA-BC × mistake_weight reweights per-sample loss</text>
  <text x="92" y="650" class="small">Inference: 4 Euler steps from Gaussian noise → action chunk</text>
  <rect x="450" y="488" width="126" height="24" rx="12" fill="#DDF2E1"/>
  <text x="513" y="504" class="chip" text-anchor="middle" fill="#2F6A35">TRAINABLE</text>

  <!-- Loss: action_loss -->
  <rect x="74" y="730" width="512" height="124" rx="18" fill="#FFF7F7" stroke="#D78C8C" stroke-width="2" filter="url(#shadow)"/>
  <text x="92" y="760" class="labelSm">Policy Loss</text>
  <text x="92" y="786" class="small">Per-sample flow matching · RA-BC × mistake_weight</text>
  <text x="92" y="828" class="formula">action_loss</text>

  <!-- =================== LANE 2 :: WORLD MODEL =================== -->

  <!-- Input -->
  <rect x="654" y="200" width="512" height="100" rx="14" fill="#FFF9EA" stroke="#E0AF45" stroke-width="1.6"/>
  <text x="672" y="222" class="labelSm">Inputs</text>
  <rect x="672" y="232" width="478" height="56" rx="10" fill="#FFFDF5" stroke="#E0AF45" stroke-width="1.2"/>
  <text x="911" y="256" class="small" text-anchor="middle">Video Clip · 3 views × 8 frames @ 384²</text>
  <text x="911" y="276" class="micro" text-anchor="middle">PyAV / decord / GPU decode · video_frame_stride = 10</text>

  <!-- Frozen encoder: V-JEPA Encoder -->
  <rect x="654" y="328" width="512" height="118" rx="18" fill="#EAF0FF" stroke="#6C92D0" stroke-width="2" filter="url(#shadow)"/>
  <text x="672" y="356" class="label">V-JEPA 2.1 Encoder · vit-base-384</text>
  <text x="672" y="380" class="body">Multi-view video latent encoder (torchhub)</text>
  <text x="672" y="402" class="small">Past + future window latents · num_frames = 8</text>
  <text x="672" y="422" class="small">Wrapped in no_grad regardless of Qwen freeze state</text>
  <rect x="1078" y="338" width="86" height="24" rx="12" fill="#D8E4FF"/>
  <text x="1121" y="354" class="chip" text-anchor="middle" fill="#284D79">FROZEN</text>

  <!-- Trainable head: VJ Predictor -->
  <rect x="654" y="478" width="512" height="226" rx="18" fill="#EDF8EF" stroke="#69A875" stroke-width="2" filter="url(#shadow)"/>
  <text x="672" y="506" class="label">VJ Predictor · VisionTransformerPredictorAC</text>
  <text x="672" y="530" class="body">Action-conditioned latent world model</text>
  <text x="672" y="556" class="small">• Past latents + Qwen action tokens → predicted future latents</text>
  <text x="672" y="578" class="small">• Corrected RoPE (use_legacy_rope_bug: false)</text>
  <text x="672" y="600" class="small">• Causal attn-mask as non-persistent buffer</text>
  <text x="672" y="622" class="small">• L1 loss vs ground-truth future latents</text>
  <text x="672" y="650" class="small">depth = 12 · num_heads = 8 · 8 action tokens / step</text>
  <rect x="1030" y="488" width="126" height="24" rx="12" fill="#DDF2E1"/>
  <text x="1093" y="504" class="chip" text-anchor="middle" fill="#2F6A35">TRAINABLE</text>

  <!-- Loss: wm_loss -->
  <rect x="654" y="730" width="512" height="124" rx="18" fill="#FFF7F7" stroke="#D78C8C" stroke-width="2" filter="url(#shadow)"/>
  <text x="672" y="760" class="labelSm">World-Model Loss</text>
  <text x="672" y="786" class="small">L1(predicted, target) future V-JEPA latents</text>
  <text x="672" y="806" class="micro">scale: linear warmup wm_initial → wm over wm_warmup_steps</text>
  <text x="672" y="836" class="formula">wm_loss</text>

  <!-- =================== LANE 3 :: GEOMETRY DISTILLATION =================== -->

  <!-- Input -->
  <rect x="1234" y="200" width="512" height="100" rx="14" fill="#FFF9EA" stroke="#E0AF45" stroke-width="1.6"/>
  <text x="1252" y="222" class="labelSm">Inputs</text>
  <rect x="1252" y="232" width="478" height="56" rx="10" fill="#FFFDF5" stroke="#E0AF45" stroke-width="1.2"/>
  <text x="1491" y="256" class="small" text-anchor="middle">Reuses last frame per view from Video Clip</text>
  <text x="1491" y="276" class="micro" text-anchor="middle">Aligned with Qwen image tokens via image_grid_thw</text>

  <!-- Frozen teacher: MoGe-2 -->
  <rect x="1234" y="328" width="512" height="118" rx="18" fill="#FFF0E4" stroke="#C28556" stroke-width="2" filter="url(#shadow)"/>
  <text x="1252" y="356" class="label">MoGe-2 Teacher · vit-s/l-normal</text>
  <text x="1252" y="380" class="body">Monocular geometry + surface-normal model</text>
  <text x="1252" y="402" class="small">Provides per-image neck-level feature targets</text>
  <text x="1252" y="422" class="small">Loaded outside trainable state dict · no_grad</text>
  <rect x="1660" y="338" width="86" height="24" rx="12" fill="#FAD8C0"/>
  <text x="1703" y="354" class="chip" text-anchor="middle" fill="#7A3F0E">FROZEN</text>

  <!-- Trainable head: DirectGeoHead -->
  <rect x="1234" y="478" width="512" height="226" rx="18" fill="#EDF8EF" stroke="#69A875" stroke-width="2" filter="url(#shadow)"/>
  <text x="1252" y="506" class="label">DirectGeometryTeacherHead</text>
  <text x="1252" y="530" class="body">MLP : Qwen image-token hiddens → MoGe feature space</text>
  <text x="1252" y="556" class="small">• Pooled feature L1 + cosine similarity</text>
  <text x="1252" y="578" class="small">• similarity_max_tokens = 4096 (memory bound)</text>
  <text x="1252" y="600" class="small">• Optional Qwen-detach during early steps</text>
  <text x="1252" y="622" class="small">• Mode: direct · feature distillation, not depth regression</text>
  <text x="1252" y="650" class="small">Disabled by default; gated by depth_teacher_aux.enabled</text>
  <rect x="1610" y="488" width="126" height="24" rx="12" fill="#DDF2E1"/>
  <text x="1673" y="504" class="chip" text-anchor="middle" fill="#2F6A35">TRAINABLE</text>

  <!-- Loss: depth_teacher_loss -->
  <rect x="1234" y="730" width="512" height="124" rx="18" fill="#FFF7F7" stroke="#D78C8C" stroke-width="2" filter="url(#shadow)"/>
  <text x="1252" y="760" class="labelSm">Geometry Teacher Loss</text>
  <text x="1252" y="786" class="small">Pooled feature L1 + cosine similarity</text>
  <text x="1252" y="806" class="micro">scale: 0.004 (canonical default)</text>
  <text x="1252" y="836" class="formula">depth_teacher_loss</text>

  <!-- =================== ARROWS (within-lane) =================== -->

  <!-- Lane 1: inputs -> Qwen -->
  <path d="M150 288 V328" stroke="#4A6075" stroke-width="2.4" marker-end="url(#arrowSlate)"/>

  <!-- Lane 1: state, future, RA-BC bypass Qwen and go to DiT/loss -->
  <!-- state -> DiT (top-left) -->
  <path d="M274 288 C 274 460 158 460 158 478" stroke="#4A6075" stroke-width="2.0" fill="none" marker-end="url(#arrowSlate)"/>
  <!-- future -> DiT -->
  <path d="M398 288 C 398 460 268 460 268 478" stroke="#4A6075" stroke-width="2.0" fill="none" marker-end="url(#arrowSlate)"/>
  <!-- RA-BC -> action_loss (bypasses head; routed along right edge of lane) -->
  <path d="M580 260 C 600 260 600 760 586 760" stroke="#4A6075" stroke-width="2.0" fill="none" marker-end="url(#arrowSlate)"/>
  <text x="595" y="500" class="edge" transform="rotate(90 595 500)">RA-BC weight</text>

  <!-- Lane 1: Qwen -> DiT (embodied tokens internal) -->
  <path d="M330 446 V478" stroke="#6D5D96" stroke-width="2.6" marker-end="url(#arrowPurple)"/>
  <text x="338" y="466" class="edge" fill="#5A4685">embodied-action tokens</text>

  <!-- Lane 1: DiT -> action_loss -->
  <path d="M330 704 V730" stroke="#3D7B53" stroke-width="2.8" marker-end="url(#arrowGreen)"/>

  <!-- Lane 2: input -> V-JEPA -->
  <path d="M911 300 V328" stroke="#4A6075" stroke-width="2.4" marker-end="url(#arrowSlate)"/>

  <!-- Lane 2: V-JEPA -> VJ Predictor (past latents, internal) -->
  <path d="M860 446 V478" stroke="#355C85" stroke-width="2.6" marker-end="url(#arrowBlue)"/>
  <text x="868" y="466" class="edge" fill="#1B4163">past latents</text>

  <!-- Lane 2: V-JEPA -> wm_loss (future latents target, bypass on right) -->
  <path d="M1146 446 C 1180 446 1180 760 1166 760" stroke="#355C85" stroke-width="2.0" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="1175" y="500" class="edge" fill="#1B4163" transform="rotate(90 1175 500)">future latents (target)</text>

  <!-- Lane 2: VJ Predictor -> wm_loss -->
  <path d="M910 704 V730" stroke="#3D7B53" stroke-width="2.8" marker-end="url(#arrowGreen)"/>

  <!-- Lane 3: MoGe -> depth_teacher_loss (target, bypass GeoHead on right) -->
  <path d="M1726 446 C 1758 446 1758 760 1746 760" stroke="#C28556" stroke-width="2.0" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="1755" y="500" class="edge" fill="#7A3F0E" transform="rotate(90 1755 500)">teacher features</text>

  <!-- Lane 3: DirectGeoHead -> depth_teacher_loss -->
  <path d="M1490 704 V730" stroke="#3D7B53" stroke-width="2.8" marker-end="url(#arrowGreen)"/>

  <!-- =================== Cross-lane arrows =================== -->

  <!-- Video Clip (lane 2) -> MoGe (lane 3): last frame -->
  <path d="M1166 250 H1234" stroke="#C28556" stroke-width="2.4" marker-end="url(#arrowOrange)"/>
  <text x="1170" y="240" class="edge" fill="#7A3F0E">last frame</text>

  <!-- Qwen (lane 1) -> VJ Predictor (lane 2): action tokens -->
  <!-- Route in the gap between encoders (y=446) and heads (y=478): horizontal at y=462 then down -->
  <path d="M586 410 C 620 410 620 530 654 530" stroke="#6D5D96" stroke-width="2.4" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="588" y="442" class="edge" fill="#5A4685">action tokens</text>

  <!-- Qwen (lane 1) -> DirectGeoHead (lane 3): image-token hidden states -->
  <!-- Route along the encoder-head gap, horizontal at y=462 across lane 2, into lane 3 head -->
  <path d="M586 392 C 1200 392 1200 530 1234 530" stroke="#6D5D96" stroke-width="2.4" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="900" y="382" class="edge" fill="#5A4685" text-anchor="middle">Qwen image-token hidden states → DirectGeoHead</text>

  <!-- =================== Loss → Total Loss =================== -->

  <rect x="310" y="900" width="1200" height="118" rx="22" fill="#FFF1F1" stroke="#D27E7E" stroke-width="2.4" filter="url(#shadow)"/>
  <text x="346" y="936" class="label">Joint Training Objective</text>
  <text x="910" y="980" class="formulaBig" text-anchor="middle">total_loss = 1.0 · action_loss  +  wm_scale(t) · wm_loss  +  0.004 · depth_teacher_loss</text>

  <!-- 3 arrows from losses to total_loss -->
  <path d="M330 854 C 330 884 600 884 600 900" stroke="#B23B3B" stroke-width="2.6" fill="none" marker-end="url(#arrowRed)"/>
  <path d="M910 854 V900" stroke="#B23B3B" stroke-width="2.6" marker-end="url(#arrowRed)"/>
  <path d="M1490 854 C 1490 884 1220 884 1220 900" stroke="#B23B3B" stroke-width="2.6" fill="none" marker-end="url(#arrowRed)"/>

  <!-- =================== Inference footer =================== -->

  <rect x="60" y="1042" width="1700" height="62" rx="18" fill="#F1F5F9" stroke="#D8E1EA" stroke-width="1.5"/>
  <text x="78" y="1068" class="labelSm">Inference</text>
  <text x="78" y="1090" class="small">Only Qwen 3.5 VL + the DiT action head run. The V-JEPA encoder, V-JEPA predictor, MoGe-2 teacher, and DirectGeoHead are training-only. 4 Euler steps from Gaussian noise → action chunk.</text>

</svg>
