<svg width="1800" height="1080" viewBox="0 0 1800 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 38px 'Helvetica Neue', Arial, sans-serif; fill: #182B44; }
      .subtitle { font: 500 18px 'Helvetica Neue', Arial, sans-serif; fill: #586B7D; }
      .section { font: 700 17px 'Helvetica Neue', Arial, sans-serif; fill: #27415A; letter-spacing: 0.14em; }
      .label { font: 700 18px 'Helvetica Neue', Arial, sans-serif; fill: #223449; }
      .body { font: 500 15px 'Helvetica Neue', Arial, sans-serif; fill: #476075; }
      .small { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #667A8D; }
      .chip { font: 700 12px 'Helvetica Neue', Arial, sans-serif; letter-spacing: 0.08em; }
      .formula { font: 700 22px 'Helvetica Neue', Arial, sans-serif; fill: #6A2323; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#AAB6C3" flood-opacity="0.16"/>
    </filter>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A6075"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355C85"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6D5D96"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3D7B53"/>
    </marker>
  </defs>

  <rect width="1800" height="1080" fill="#F5F7FA"/>
  <rect x="28" y="24" width="1744" height="1032" rx="30" fill="#FBFCFE" stroke="#D8E1EA" stroke-width="2"/>

  <text x="64" y="88" class="title">VLA-JEPA: Joint Vision-Language Policy and Latent World Model</text>
  <text x="64" y="122" class="subtitle">Frozen multimodal perception feeds two trainable branches: a latent world model and a diffusion policy head.</text>

  <text x="74" y="174" class="section">INPUTS</text>
  <text x="452" y="174" class="section">FROZEN PERCEPTION</text>
  <text x="1064" y="174" class="section">TRAINABLE BRANCHES</text>
  <text x="1064" y="716" class="section">TRAINING LOSSES</text>

  <rect x="60" y="196" width="272" height="108" rx="22" fill="#FFF4DC" stroke="#E0AF45" stroke-width="2" filter="url(#shadow)"/>
  <text x="88" y="236" class="label">Language + Images</text>
  <text x="88" y="268" class="body">Instruction / CoT prompt</text>

  <rect x="60" y="334" width="272" height="124" rx="22" fill="#FFF4DC" stroke="#E0AF45" stroke-width="2" filter="url(#shadow)"/>
  <text x="88" y="374" class="label">Video Clip</text>
  <text x="88" y="406" class="body">3 views × 8 frames at 384 × 384</text>

  <rect x="60" y="488" width="272" height="100" rx="22" fill="#FFF4DC" stroke="#E0AF45" stroke-width="2" filter="url(#shadow)"/>
  <text x="88" y="528" class="label">Robot State</text>
  <text x="88" y="560" class="body">Proprioceptive state</text>

  <rect x="60" y="618" width="272" height="136" rx="22" fill="#FFF4DC" stroke="#E0AF45" stroke-width="2" filter="url(#shadow)"/>
  <text x="88" y="658" class="label">Supervision</text>
  <text x="88" y="690" class="body">Future action chunk</text>
  <text x="88" y="716" class="body">RA-BC labels</text>

  <rect x="430" y="196" width="560" height="366" rx="30" fill="#EAF0FF" stroke="#6C92D0" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="468" y="230" width="484" height="122" rx="22" fill="#F8FBFF" stroke="#86A6DB" stroke-width="1.8"/>
  <text x="500" y="272" class="label">Qwen 3.5 VL</text>
  <text x="500" y="304" class="body">Multimodal feature extractor</text>
  <text x="500" y="330" class="small">Produces action-token and embodied-action-token features</text>
  <rect x="836" y="242" width="88" height="28" rx="14" fill="#D8E4FF"/>
  <text x="857" y="261" class="chip" fill="#284D79">FROZEN</text>

  <rect x="468" y="394" width="484" height="132" rx="22" fill="#F8FBFF" stroke="#86A6DB" stroke-width="1.8"/>
  <text x="500" y="436" class="label">V-JEPA Encoder</text>
  <text x="500" y="468" class="body">Multi-view video latent encoder</text>
  <text x="500" y="494" class="small">Maps videos to latent patch tokens over time</text>
  <rect x="836" y="406" width="88" height="28" rx="14" fill="#D8E4FF"/>
  <text x="857" y="425" class="chip" fill="#284D79">FROZEN</text>

  <rect x="468" y="616" width="484" height="138" rx="24" fill="#F6F0FF" stroke="#9B85C4" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="500" y="656" class="label">Qwen Token Extraction</text>
  <rect x="500" y="682" width="188" height="44" rx="14" fill="#FCFAFF" stroke="#B39DD8" stroke-width="1.5"/>
  <text x="528" y="710" class="body">Action tokens</text>
  <rect x="732" y="682" width="188" height="44" rx="14" fill="#FCFAFF" stroke="#B39DD8" stroke-width="1.5"/>
  <text x="746" y="710" class="body">Embodied-action tokens</text>

  <rect x="1048" y="196" width="694" height="366" rx="30" fill="#EDF8EF" stroke="#69A875" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="1084" y="230" width="278" height="148" rx="22" fill="#FBFEFB" stroke="#88BD8E" stroke-width="1.8"/>
  <text x="1114" y="272" class="label">VJ Predictor</text>
  <text x="1114" y="304" class="body">Action-conditioned latent world model</text>
  <text x="1114" y="330" class="body">Predicts future video latents</text>
  <rect x="1236" y="242" width="100" height="28" rx="14" fill="#DDF2E1"/>
  <text x="1255" y="261" class="chip" fill="#2F6A35">TRAINABLE</text>

  <rect x="1428" y="230" width="278" height="168" rx="22" fill="#FBFEFB" stroke="#88BD8E" stroke-width="1.8"/>
  <text x="1458" y="272" class="label">GR00T Action Head</text>
  <text x="1458" y="304" class="body">State encoder + action encoder + DiT</text>
  <text x="1458" y="330" class="body">Predicts action velocity / denoising direction</text>
  <rect x="1580" y="242" width="100" height="28" rx="14" fill="#DDF2E1"/>
  <text x="1599" y="261" class="chip" fill="#2F6A35">TRAINABLE</text>

  <rect x="1084" y="430" width="622" height="92" rx="20" fill="#F8FFF9" stroke="#8ABD8F" stroke-width="1.6"/>
  <text x="1114" y="466" class="label">Architecture Rationale</text>
  <text x="1114" y="496" class="body">Qwen provides semantic intent. V-JEPA provides temporal scene dynamics. The model learns both jointly.</text>

  <rect x="1084" y="744" width="278" height="134" rx="22" fill="#FFF7F7" stroke="#D78C8C" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1114" y="786" class="label">World-Model Loss</text>
  <text x="1114" y="818" class="body">Predicted future video latents</text>
  <text x="1114" y="844" class="body">vs. target future video latents</text>
  <text x="1114" y="868" class="formula">wm_loss</text>

  <rect x="1428" y="744" width="278" height="134" rx="22" fill="#FFF7F7" stroke="#D78C8C" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1458" y="786" class="label">Policy Loss</text>
  <text x="1458" y="818" class="body">Flow-matching action loss</text>
  <text x="1458" y="844" class="body">optionally reweighted by RA-BC</text>
  <text x="1458" y="868" class="formula">action_loss</text>

  <rect x="1204" y="918" width="388" height="110" rx="24" fill="#FFF1F1" stroke="#D27E7E" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="1238" y="960" class="label">Joint Objective</text>
  <text x="1238" y="996" class="formula">total_loss = action_loss + 0.1 × wm_loss</text>

  <path d="M332 250 H430" stroke="#4A6075" stroke-width="3.4" marker-end="url(#arrowSlate)"/>
  <path d="M332 396 H430" stroke="#4A6075" stroke-width="3.4" marker-end="url(#arrowSlate)"/>
  <path d="M332 538 H1428" stroke="#4A6075" stroke-width="3.1" marker-end="url(#arrowSlate)"/>
  <path d="M332 686 H1428" stroke="#4A6075" stroke-width="3.1" marker-end="url(#arrowSlate)"/>

  <path d="M710 352 V616" stroke="#6D5D96" stroke-width="3.1" marker-end="url(#arrowPurple)"/>
  <path d="M710 616 H594" stroke="#6D5D96" stroke-width="3.1"/>
  <path d="M710 616 H826" stroke="#6D5D96" stroke-width="3.1"/>

  <path d="M990 460 H1084" stroke="#355C85" stroke-width="3.5" marker-end="url(#arrowBlue)"/>
  <text x="1008" y="444" class="small">past video latents</text>

  <path d="M990 704 H1084" stroke="#6D5D96" stroke-width="3.5" marker-end="url(#arrowPurple)"/>
  <text x="1010" y="688" class="small">action tokens</text>

  <path d="M920 704 H1428" stroke="#6D5D96" stroke-width="3.5" marker-end="url(#arrowPurple)"/>
  <text x="1134" y="688" class="small">embodied-action tokens</text>

  <path d="M990 420 C1054 420 1056 676 1084 676" stroke="#355C85" stroke-width="3.1" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="1004" y="500" class="small">future latent targets</text>

  <path d="M1223 378 V744" stroke="#3D7B53" stroke-width="3.1" marker-end="url(#arrowGreen)"/>
  <path d="M1567 398 V744" stroke="#3D7B53" stroke-width="3.1" marker-end="url(#arrowGreen)"/>
  <path d="M1223 878 V918" stroke="#4A6075" stroke-width="3.1" marker-end="url(#arrowSlate)"/>
  <path d="M1567 878 V918" stroke="#4A6075" stroke-width="3.1" marker-end="url(#arrowSlate)"/>

  <rect x="60" y="932" width="1040" height="72" rx="22" fill="#F1F5F9" stroke="#D8E1EA" stroke-width="1.5"/>
  <text x="88" y="974" class="body">Inference uses only the Qwen branch and GR00T action head: Qwen provides embodied-action conditioning, then the action head runs a short denoising rollout to predict the future action chunk.</text>
</svg>
