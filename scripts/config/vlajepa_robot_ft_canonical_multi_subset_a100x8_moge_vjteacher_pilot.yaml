# Larger A100x8 canonical GCS pilot with both teacher signals active:
# - V-JEPA teacher: frozen V-JEPA encoder + positive wm_loss scale.
# - MoGe teacher: frozen Ruicheng/moge-2-vitl-normal feature distillation.
run_id: robot_ft_canonical_multi_subset_a100x8_moge_vjteacher_pilot
run_root_dir: /mnt/vla-jepa/checkpoints
seed: 42
trackers:
  - tensorboard
is_debug: false

framework:
  name: VLA_JEPA
  qwenvl:
    base_vlm: "Qwen/Qwen3-VL-2B-Instruct"
    attn_implementation: sdpa
    enable_fast_linear_attention: false
    device_map: null
    vl_hidden_dim: auto
    blockwise_attention:
      enabled: false
    lora:
      enabled: true
      adapter_name: temporal_policy
      r: 16
      alpha: 32
      dropout: 0.05
      bias: none
      layers_pattern: layers
      train_last_n_layers: 16
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj
  qwen_state:
    num_tokens: 8
    token_template: <|state_{}|>
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 49
    state_dim: 53
    future_action_window_size: 49
    action_horizon: 50
    past_action_window_size: 0
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    rtc_training:
      enabled: false
      method: prefix
      max_delay: 11
      distribution: uniform
      rtc_prob: 1.0
      warmup_steps: 0
      ramp_steps: 0
      clean_time: 1.0
      condition_dit_tokens: false
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: auto
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null
  depth_teacher_aux:
    enabled: true
    mode: query
    teacher_model: Ruicheng/moge-2-vitl-normal
    moge_repo_path: /mnt/vla-jepa/src/MoGe
    input_size: 224
    num_tokens: 256
    num_task_tokens: 8
    num_output_tokens: 256
    geometry_token_template: <|geometry_{}|>
    query_num_layers: 1
    query_num_heads: 4
    query_dim_head: 32
    query_ff_mult: 1.0
    query_smooth_l1_beta: 1.0
    teacher_feature_source: neck
    teacher_feature_level: 0
    teacher_feature_dim: auto
    frame_value_range: uint8
    detach_vlm_steps: 5
    detach_vlm_fraction: 0.01
    use_fp16: true
    allow_frozen_qwen: false
    allow_zero_loss_scale: false
  vj2_model:
    source: torchhub
    hub_repo_or_dir: /mnt/vla-jepa/src/vjepa2
    hub_model_name: vjepa2_1_vit_base_384
    hub_preprocessor_name: vjepa2_preprocessor
    hub_checkpoint_url: https://dl.fbaipublicfiles.com/vjepa2/vjepa2_1_vitb_dist_vitG_384.pt
    hub_checkpoint_key: ema_encoder
    crop_size: 384
    pretrained: true
    freeze_encoder: true
    num_video_views: 3
    depth: 12
    num_heads: 8
    use_legacy_rope_bug: false
    special_action_token: <|action_{}|>
    num_action_tokens_per_timestep: 8
    embodied_action_token: <|embodied_action|>
    num_embodied_action_tokens_per_instruction: 32
    num_frames: 8
  reduce_in_full_precision: true

datasets:
  vla_data:
    dataset_py: canonical_subset_vla
    data_root_dir: /mnt/vla-jepa/datasets/canonical_gcs
    dataset_canonicalization_root: /mnt/vla-jepa/src/dataset-canonicalization
    manifest_path: /mnt/vla-jepa/src/dataset-canonicalization/configs/manifests/dataset_manifests.jsonl.gz
    adapter_dir: /mnt/vla-jepa/src/dataset-canonicalization/configs/dataset_adapters
    cache_dir: /mnt/vla-jepa/datasets/canonical_gcs
    bucket_root: gs://robotics-datasets-yonduai/raw
    dataset_ids:
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_place_in_block_tennis_ball
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_place_in_shape
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_place_in_fruit_bread
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_place_in_fruit
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_blue_cub_on_pink
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_place_in_bread_on_plate_1
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_241023_place_pear_in_bowl_1
      - BAAI-DataCube/robomind_benchmark1_1_release_franka_3rgb_take_marker_pen
      - BAAI-DataCube/robomind_benchmark1_1_release_franka_3rgb_close_garbage_bin
      - BAAI-DataCube/robomind_benchmark1_1_release_franka_3rgb_turn_on_desk_lamp
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_241021_insert_marker_1
      - BAAI-DataCube/robomind_benchmark1_1_release_franka_3rgb_put_the_bread_on_the_table
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_place_in_trash
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_241023_pick_pear_from_bowl_1
      - BAAI-DataCube/robomind_benchmark1_1_release_franka_3rgb_turn_off_lamp
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_slide_open_cabinet
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_241022_side_pull_open_drawer_1
      - BAAI-DataCube/robomind_benchmark1_1_release_franka_3rgb_mobile_marco_cup
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_241021_remove_marker_1
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_place_plate_in_plate_rack
    adapter_group_ids:
      - BAAI-DataCube_franka_3rgb__79fcbe0b6dcf
      - BAAI-DataCube_franka_3rgb__fd31f11d43e5
      - BAAI-DataCube_franka_3rgb__16197072458c
      - BAAI-DataCube_franka_3rgb__fcc2a73ac3e4
    camera_slots: [left, right, main]
    preferred_fps: []  # Empty means allow all manifest FPS values.
    allow_gcs_download: true
    max_shards: 20
    max_shards_per_dataset: 1
    max_windows: 0
    max_windows_per_dataset: 96
    sample_stride: 8
    sidecar_normalization: shard_q01_q99
    sidecar_dtype: float16
    video_decode_backend: auto
    CoT_prompt: "Your task is {instruction}. Use the robot observations and state to produce the corresponding policy actions. {state}{e_actions}{actions}{geometry}"
    resolution_size: 224
    video_resolution_size: 384
    video_frame_stride: 10
    video_target_shift_steps: 2
    gpu_video_decode_on_rank: false
    cpu_video_decode_drop_worker_images: true
    runtime_timing_logging: true
    per_device_batch_size: 2
    num_workers: 1
    prefetch_factor: 2
    persistent_workers: false
    multiprocessing_context: spawn
    worker_torch_threads: 1
    worker_cv2_threads: 1
    pin_memory: true
    drop_last: true
    with_state: true

trainer:
  epochs: 2
  max_train_steps: 120
  num_warmup_steps: 4
  save_interval: 1000
  eval_interval: 1000
  save_best_only: false
  best_metric_name: mae_score
  best_metric_mode: min
  learning_rate:
    base: 3.0e-05
    qwen_vl_interface: 2.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: "vj_encoder"
  loss_scale:
    action: 1.0
    wm: 0.1
    wm_initial: 0.3
    wm_warmup_steps: 30
    depth_teacher: 0.004
  warmup_ratio: 0.0
  logging_frequency: 5
  progress_eta_window: 20
  progress_eta_warmup_steps: 3
  eval_before_train: false
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  repeated_diffusion_steps: 1
  find_unused_parameters: true

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-04
    fused: true

  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: false
  mixed_precision: no
  channels_last: true
  compile_qwen_model: false
  compile_qwen_model_dynamic: false
  compile_action_model: false
  compile_action_model_dynamic: false
  compile_vj_predictor: false
  compile_vj_predictor_dynamic: false
  compile_vj_encoder: false
  compile_vj_encoder_dynamic: false
  compile_full_model: false
  compile_full_model_dynamic: false
  compile_mode: default
  compile_dynamic: false
  save_plain_weights_in_checkpoints: false
  drop_checkpoint_page_cache: true
  trim_process_memory_after_checkpoint: true
  profile_cuda_memory: true
  profile_cuda_memory_log_step: 10
  use_rabc: false
