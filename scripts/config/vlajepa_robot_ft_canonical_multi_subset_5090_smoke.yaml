run_id: robot_ft_canonical_multi_subset_5090_smoke
run_root_dir: checkpoints
seed: 42
trackers:
  - tensorboard
is_debug: false

framework:
  name: VLA_JEPA
  qwenvl:
    base_vlm: "Qwen/Qwen3.5-0.8B"
    attn_implementation: flash_attention_2
    enable_fast_linear_attention: true
    vl_hidden_dim: 1024
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 49
    state_dim: 53
    future_action_window_size: 49
    action_horizon: 50
    past_action_window_size: 0
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    rtc_training:
      enabled: false
      method: prefix
      # max_delay is exclusive; 11 samples 0..10-step prefixes.
      max_delay: 11
      distribution: uniform
      rtc_prob: 1.0
      warmup_steps: 0
      ramp_steps: 0
      clean_time: 1.0
      condition_dit_tokens: false
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 1024
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null
  vj2_model:
    source: torchhub
    hub_repo_or_dir: /home/mehul/work/vjepa/vjepa2
    hub_model_name: vjepa2_1_vit_base_384
    hub_preprocessor_name: vjepa2_preprocessor
    crop_size: 384
    pretrained: true
    freeze_encoder: true
    num_video_views: 3
    depth: 12
    num_heads: 8
    use_legacy_rope_bug: false
    special_action_token: <|action_{}|>
    num_action_tokens_per_timestep: 8
    embodied_action_token: <|embodied_action|>
    num_embodied_action_tokens_per_instruction: 32
    num_frames: 8
  reduce_in_full_precision: true

datasets:
  vla_data:
    dataset_py: canonical_subset_vla
    data_root_dir: /home/mehul/work/vjepa/VLA-JEPA/.cache/canonical_gcs
    dataset_canonicalization_root: /home/mehul/work/dataset-canonicalization
    manifest_path: /home/mehul/work/dataset-canonicalization/configs/manifests/dataset_manifests.jsonl.gz
    adapter_dir: /home/mehul/work/dataset-canonicalization/configs/dataset_adapters
    cache_dir: /home/mehul/work/vjepa/VLA-JEPA/.cache/canonical_gcs
    bucket_root: gs://robotics-datasets-yonduai/raw
    dataset_ids:
      - BAAI-DataCube/robomind_benchmark1_1_release_franka_3rgb_yellow_square_placed_on_ceramic_plate
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_pick_apple_into_chest
      - BAAI-DataCube/robomind_benchmark1_0_release_franka_3rgb_slide_close_drawer
    adapter_group_ids:
      - BAAI-DataCube_franka_3rgb__16197072458c
      - BAAI-DataCube_franka_3rgb__fd31f11d43e5
      - BAAI-DataCube_franka_3rgb__fcc2a73ac3e4
    camera_slots: [left, right, main]
    preferred_fps: []  # Empty means allow all manifest FPS values.
    allow_gcs_download: true
    max_shards: 3
    max_shards_per_dataset: 1
    max_windows: 0
    max_windows_per_dataset: 4
    sample_stride: 64
    sidecar_normalization: shard_q01_q99
    sidecar_dtype: float16
    video_decode_backend: auto
    CoT_prompt: "Your task is {instruction}. Infer the temporal dynamics from frames {actions} and produce the corresponding policy actions {e_actions}."
    resolution_size: 224
    video_resolution_size: 384
    video_frame_stride: 10
    video_target_shift_steps: 2
    gpu_video_decode_on_rank: false
    cpu_video_decode_drop_worker_images: true
    runtime_timing_logging: true
    per_device_batch_size: 1
    num_workers: 0
    pin_memory: true
    drop_last: true
    with_state: true

trainer:
  epochs: 1
  max_train_steps: 6
  num_warmup_steps: 0
  save_interval: 1000
  eval_interval: 1000
  save_best_only: false
  best_metric_name: mae_score
  best_metric_mode: min
  learning_rate:
    base: 3.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: "qwen_vl_interface.model,vj_encoder"
  loss_scale:
    action: 1.0
    wm: 0.1
  warmup_ratio: 0.0
  logging_frequency: 1
  eval_before_train: false
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  repeated_diffusion_steps: 1
  find_unused_parameters: true

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-04
    fused: true

  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: false
  mixed_precision: no
  channels_last: true
  compile_qwen_model: false
  compile_qwen_model_dynamic: false
  compile_action_model: false
  compile_action_model_dynamic: false
  compile_vj_predictor: false
  compile_vj_predictor_dynamic: false
  compile_vj_encoder: false
  compile_vj_encoder_dynamic: false
  compile_full_model: false
  compile_full_model_dynamic: false
  compile_mode: default
  compile_dynamic: false
  save_plain_weights_in_checkpoints: false
  drop_checkpoint_page_cache: true
  trim_process_memory_after_checkpoint: true
  use_rabc: false
