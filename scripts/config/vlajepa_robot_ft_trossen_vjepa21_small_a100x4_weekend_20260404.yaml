# Reference machine for this config:
# - 4 x NVIDIA A100-SXM4-40GB (40 GiB VRAM each)
# - 48 logical CPUs / 24 physical cores
# - 334 GiB system RAM
# These settings are tuned for that box:
# - per_device_batch_size: 104
# - num_workers: 5
# - prefetch_factor: 1
# - gpu_video_decode_on_rank: false
# - compile_qwen_model/action_model/vj_predictor/vj_encoder: true
# How to scale on another machine:
# - Less VRAM than 40 GiB/GPU: lower per_device_batch_size first.
# - Less system RAM or fewer CPU cores: lower num_workers first, then prefetch_factor.
# - More VRAM but similar CPU/RAM: do not raise batch without also checking host RAM and dataloader pressure.
# - More CPU/RAM but same VRAM: raise num_workers before raising batch size.
# - This config assumes train/eval share one live dataloader iterator pool; if that changes, revisit num_workers.
run_id: robot_ft_trossen_vjepa21_small_a100x4_weekend_20260404
run_root_dir: checkpoints
seed: 42
trackers:
  - tensorboard
is_debug: false

framework:
  name: VLA_JEPA
  qwenvl:
    base_vlm: "Qwen/Qwen3.5-0.8B"
    attn_implementation: flash_attention_2
    enable_fast_linear_attention: true
    device_map: null
    vl_hidden_dim: 1024
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 14
    state_dim: 14
    future_action_window_size: 6
    action_horizon: 7
    past_action_window_size: 0
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    rtc_training:
      enabled: false
      method: prefix
      # max_delay is exclusive; 4 samples 0..3-step prefixes.
      max_delay: 4
      distribution: exponential
      rtc_prob: 1.0
      warmup_steps: 0
      ramp_steps: 0
      clean_time: 1.0
      condition_dit_tokens: false
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 1024
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null
  vj2_model:
    source: torchhub
    hub_repo_or_dir: /home/mehul_yonduai_com/work/vjepa2
    hub_model_name: vjepa2_1_vit_base_384
    hub_preprocessor_name: vjepa2_preprocessor
    hub_checkpoint_url: https://dl.fbaipublicfiles.com/vjepa2/vjepa2_1_vitb_dist_vitG_384.pt
    hub_checkpoint_key: ema_encoder
    crop_size: 384
    pretrained: true
    freeze_encoder: true
    num_video_views: 3
    depth: 12
    num_heads: 8
    use_legacy_rope_bug: false
    special_action_token: <|action_{}|>
    num_action_tokens_per_timestep: 8
    embodied_action_token: <|embodied_action|>
    num_embodied_action_tokens_per_instruction: 32
    num_frames: 8
  reduce_in_full_precision: true

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: playground/Datasets/TROSSEN_SUBTASK_COMBINED
    data_mix: trossen_subtask_combined
    action_type: delta_qpos
    CoT_prompt: "Your task is {instruction}. Infer the temporal dynamics from frames {actions} and produce the corresponding policy actions {e_actions}."
    resolution_size: 224
    video_resolution_size: 384
    video_frame_stride: 10
    video_target_shift_steps: 2
    gpu_video_decode_on_rank: false
    per_device_batch_size: 104
    num_workers: 5
    prefetch_factor: 1
    persistent_workers: false
    multiprocessing_context: spawn
    worker_torch_threads: 1
    worker_cv2_threads: 1
    video_backend_num_threads: 1
    pin_memory: true
    drop_last: true
    load_all_data_for_training: true
    with_state: true

trainer:
  epochs: 5
  max_train_steps: auto
  num_warmup_steps: auto
  save_interval: 1000
  eval_interval: 1000
  save_best_only: false
  best_metric_name: mae_score
  best_metric_mode: min
  learning_rate:
    base: 3.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: "qwen_vl_interface.model,vj_encoder"
  loss_scale:
    action: 1.0
    wm: 0.1
  warmup_ratio: 0.01
  logging_frequency: 50
  eval_before_train: false
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  repeated_diffusion_steps: 2
  find_unused_parameters: true

  optimizer:
    name: AdamW8bit
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-04
    fused: true

  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: false
  mixed_precision: no
  channels_last: true
  compile_qwen_model: true
  compile_qwen_model_dynamic: false
  compile_action_model: true
  compile_action_model_dynamic: false
  compile_vj_predictor: true
  compile_vj_predictor_dynamic: false
  compile_vj_encoder: true
  compile_vj_encoder_dynamic: true
  compile_full_model: false
  compile_full_model_dynamic: false
  compile_mode: default
  compile_dynamic: false
  save_plain_weights_in_checkpoints: false
  drop_checkpoint_page_cache: true
  trim_process_memory_after_checkpoint: true
  use_rabc: true
  rabc_progress_key: rabc_progress_delta
  rabc_fallback_progress_key: rabc_global_progress_delta
  rabc_kappa: 0.01
  rabc_epsilon: 1.0e-06
  rabc_mistake_weight: 0.25
